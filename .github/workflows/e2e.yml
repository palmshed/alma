---
# End-to-End — Full browser verification.
#
# Answers: "Can a user actually use Alma?"
# Runs Playwright against the deployed app or a local instance.
# Validates the real user workflow across all modes.

name: E2E

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ALMA_BASE_URL: http://localhost:8000
      ALMA_FRONTEND_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies
        run: uv sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Install Playwright
        run: |
          uv run playwright install chromium --with-deps

      - name: Start backend
        run: |
          nohup uv run python backend/app.py > /tmp/backend.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -s http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend up"
              break
            fi
            sleep 1
          done

      - name: Start frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend up"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start. Logs:"
          cat /tmp/frontend.log
          exit 1
        working-directory: frontend

      - name: Run E2E verification
        continue-on-error: true
        run: |
          uv run python -m backend.verify e2e --json --output backend/verify-output

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: backend/verify-output/e2e/**/*.png

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-html
          path: backend/verify-output/e2e/report.html

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-json
          path: backend/verify-output/e2e/report.json

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: backend/verify-output/e2e/**/trace.zip

      - name: Summarize results
        if: always()
        run: |
          if [ -f backend/verify-output/e2e/report.json ]; then
            uv run python -c "
          import json, sys
          r = json.load(open('backend/verify-output/e2e/report.json'))
          s = r['summary']
          print(f\"E2E: {s['passed']}/{s['total']} passed, {s['failed']} failed, {s['skipped']} skipped\")
          if s['failed'] > 0:
            sys.exit(1)
          "
          else
            echo "No E2E report found"
          fi

          if [ -f /tmp/backend.log ]; then
            echo "--- Backend log (tail) ---"
            tail -5 /tmp/backend.log
          fi
          if [ -f /tmp/frontend.log ]; then
            echo "--- Frontend log (tail) ---"
            tail -5 /tmp/frontend.log
          fi
