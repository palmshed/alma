---
# Publish Release
# Triggers when a version-bump PR is merged to main.
# Tags the merged commit and creates a GitHub release.

name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'version-bump')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          version=$(cat VERSION)
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Validate tag does not exist
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.VERSION }}"; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check.outputs.SKIP == 'false'
        run: |
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Generate release notes
        if: steps.check.outputs.SKIP == 'false'
        id: notes
        run: |
          # Find the previous version tag
          prev_tag=$(git tag -l 'v*' --sort=-version:refname | head -2 | tail -1)
          if [ -z "$prev_tag" ]; then
            range="HEAD"
          else
            range="${prev_tag}..HEAD"
          fi

          notes=$(git log --oneline --pretty=format:"- %s" "$range" | grep -v "chore: bump version" | head -20)
          # Write to file to preserve newlines
          echo "$notes" > /tmp/release-notes.txt

      - name: Create release
        if: steps.check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release-notes.txt
          draft: false
          prerelease: false
