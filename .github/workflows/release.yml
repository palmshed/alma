---
# Publish Release
#
# Triggers when a version-bump PR is merged to main.
# Runs full verification, then tags and creates a GitHub release.

name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'version-bump')
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies
        run: uv sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run tests
        run: PYTHONPATH=backend uv run pytest backend/tests/ -W ignore::DeprecationWarning

      - name: Platform verification
        run: uv run python -m backend.verify --platform

      - name: Start backend
        run: |
          nohup uv run python backend/app.py > /tmp/backend.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -s http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend up"
              break
            fi
            sleep 1
          done

      - name: Application verification
        run: uv run python -m backend.verify --application

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verify
          path: /tmp/verify-report.json

  publish:
    needs: verify
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'version-bump')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          version=$(cat VERSION)
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Validate tag does not exist
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.VERSION }}"; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check.outputs.SKIP == 'false'
        run: |
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Generate release notes
        if: steps.check.outputs.SKIP == 'false'
        id: notes
        run: |
          prev_tag=$(git tag -l 'v*' --sort=-version:refname | head -2 | tail -1)
          if [ -z "$prev_tag" ]; then
            range="HEAD"
          else
            range="${prev_tag}..HEAD"
          fi
          notes=$(git log --oneline --pretty=format:"- %s" "$range" | grep -v "chore: bump version" | head -20)
          echo "$notes" > /tmp/release-notes.txt

      - name: Create release
        if: steps.check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release-notes.txt
          draft: false
          prerelease: false
