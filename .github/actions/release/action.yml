---
# Composite Action: Prepare Version Bump
# Creates a PR that bumps VERSION, __init__.py, and pyproject.toml.
# Tagging and release happen in a separate workflow after merge.

name: 'Prepare Version Bump'
description: 'Bump version and create PR'
inputs:
  token:
    description: GitHub token for API access
    required: true
runs:
  using: 'composite'
  steps:
    - name: Compute new version
      run: |
        current=$(cat VERSION)
        new=$(echo "$current" | awk -F. '{print $1"."$2"."($3+1)}')
        echo "CURRENT=$current" >> $GITHUB_ENV
        echo "NEW=$new" >> $GITHUB_ENV
      shell: bash
    - name: Bump version files
      run: |
        python3 -c "
        import re, sys

        current = '${{ env.CURRENT }}'
        new = '${{ env.NEW }}'

        # VERSION
        with open('VERSION', 'w') as f:
            f.write(new + '\n')

        # __init__.py
        with open('backend/palmshed_ai/__init__.py', 'r') as f:
            content = f.read()
        content = content.replace(f'__version__ = \"{current}\"', f'__version__ = \"{new}\"')
        with open('backend/palmshed_ai/__init__.py', 'w') as f:
            f.write(content)

        # pyproject.toml — only the top-level version line
        with open('pyproject.toml', 'r') as f:
            lines = f.readlines()
        for i, line in enumerate(lines):
            if line.startswith('version = ') and 'target-version' not in line:
                lines[i] = f'version = \"{new}\"\n'
                break
        with open('pyproject.toml', 'w') as f:
            f.writelines(lines)

        # Verify all three agree
        with open('VERSION') as f:
            v1 = f.read().strip()
        with open('backend/palmshed_ai/__init__.py') as f:
            v2 = re.search(r'__version__ = \"(.+?)\"', f.read()).group(1)
        with open('pyproject.toml') as f:
            v3 = re.search(r'^version = \"(.+?)\"', f.read(), re.MULTILINE).group(1)

        assert v1 == v2 == v3 == new, f'Version mismatch: VERSION={v1} __init__={v2} pyproject={v3}'
        print(f'Version bumped: {current} → {new}')
        "
      shell: bash
    - name: Create PR
      id: create-pr
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ inputs.token }}
        branch: automated/version-bump
        title: "chore: bump version to v${{ env.NEW }}"
        body: |
          Prepares release v${{ env.NEW }}.

          - Updates VERSION, `__init__.py`, pyproject.toml
          - All version sources verified in sync
        commit-message: "chore: bump version to v${{ env.NEW }}"
        labels: |
          automated
          version-bump
