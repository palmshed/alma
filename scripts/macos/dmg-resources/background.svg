<svg xmlns="http://www.w3.org/2000/svg" width="660" height="420" viewBox="0 0 660 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F2F4F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="420" fill="url(#bg)" rx="4"/>

  <!-- Arrow -->
  <g transform="translate(275, 195)">
    <line x1="0" y1="0" x2="90" y2="0" stroke="#D0D5DD" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="90,-8 108,0 90,8" fill="#D0D5DD"/>
  </g>

  <!-- Instruction -->
  <text x="330" y="330" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#98A2B3" text-anchor="middle" letter-spacing="0.3">
    <tspan>Drag Alma to Applications to install.</tspan>
  </text>

  <!-- Wordmark -->
  <text x="24" y="398" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#D0D5DD" font-weight="600" letter-spacing="0.5">Alma</text>
</svg>
